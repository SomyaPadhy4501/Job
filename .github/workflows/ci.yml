name: ci

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            scraper/package-lock.json
            web/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web (Vite)
        working-directory: web
        run: npm run build

      - name: Syntax-check Node.js sources
        run: |
          set -e
          count=0
          while IFS= read -r -d '' f; do
            node --check "$f"
            count=$((count + 1))
          done < <(find src api scraper/src -name '*.js' -not -path '*/node_modules/*' -print0)
          echo "Syntax-checked $count files."
